<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Kali - Voice-first game moderator" />
    <meta name="theme-color" content="#000000" />
    <title>Kali - Voice Game Moderator</title>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <div class="production-ui">
        <h1 class="visually-hidden">Kali</h1>
        <div id="status-indicator"></div>
        <button id="start-button"></button>
        <p id="ios-install-hint" class="ios-install-hint" hidden></p>
        <p id="version-notice" class="version-notice" hidden aria-live="polite">
          <span id="version-notice-message"></span>
          <button type="button" id="version-refresh"></button>
        </p>
        <p id="version-current" class="version-current" aria-live="polite"></p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
