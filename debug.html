<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kali - Voice-first game moderator (Debug Mode)" />
    <meta name="theme-color" content="#000000" />
    <title>Kali Debug - Voice Game Moderator</title>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <div class="debug-ui">
        <h1>Kali <span class="debug-badge">DEBUG</span></h1>
        <div id="status-indicator"></div>
        <p id="status"></p>
        <button id="start-button"></button>
        <button id="skip-to-playing-button" class="skip-button" style="display: none">
          ⚡ Skip to Playing
        </button>

        <div class="transcript-input-panel">
          <h3>Free Text (skips wake word + STT, LLM interprets)</h3>
          <div class="transcript-row">
            <input
              id="transcript-input"
              type="text"
              placeholder="Type a command: I rolled 5, say hello, etc."
              autocomplete="off"
            />
            <button id="submit-transcript-button" disabled>Send</button>
          </div>
        </div>

        <div id="console"></div>
      </div>
    </div>
    <script type="module" src="/src/debug.ts"></script>
  </body>
</html>
