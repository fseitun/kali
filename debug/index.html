<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Kali - Voice-first game moderator (Debug Mode)" />
    <meta name="theme-color" content="#000000" />
    <title>Kali Debug - Voice Game Moderator</title>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <div class="debug-ui">
        <h1>
          Kali <span class="debug-badge">DEBUG</span>
          <span id="llm-indicator" class="debug-badge llm-badge"></span>
        </h1>
        <p id="status"></p>
        <fieldset class="log-options" id="log-options">
          <legend>Log categories</legend>
          <div id="log-categories"></div>
        </fieldset>
        <button id="start-button"></button>

        <form id="transcript-form" class="transcript-row">
          <input
            id="transcript-input"
            type="text"
            placeholder="Type a command: I rolled 5, say hello, etc."
            autocomplete="off"
          />
          <button type="submit" id="submit-transcript-button" disabled>Send</button>
        </form>

        <div id="console"></div>
      </div>
    </div>
    <script type="module" src="/src/debug.ts"></script>
  </body>
</html>
